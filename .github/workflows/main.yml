name: CI

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  release:
    types:
    - created

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
    - run: npm ci
    - name: Type-check
      run: npm run check-types
    - name: Lint
      run: npm run lint
    - name: Compile bundles
      run: npm run compile
    - name: Client unit tests
      run: npm run test:client
    - name: Server handshake test
      run: npm run test:server
    - name: Output evals (grammar)
      run: npm run eval
    - name: Package smoke test
      run: npm run package
    - name: Publish to Marketplace
      if: success() && github.event_name == 'release' && matrix.os == 'ubuntu-latest'
      run: npm run deploy
      env:
        VSCE_PAT: ${{ secrets.MARKETPLACE }}
