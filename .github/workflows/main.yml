name: CI

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  release:
    types:
    - created

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - run: npm install
    - name: Build grammar
      run: npm run build:grammar
    - name: Run grammar tests
      run: npm run test:grammar
    - name: Package smoke test
      run: npx vsce package --no-dependencies -o vscode-smalltalk.vsix
    - name: Publish to Marketplace
      if: success() && github.event_name == 'release' && matrix.os == 'ubuntu-latest'
      run: npm run deploy
      env:
        VSCE_PAT: ${{ secrets.MARKETPLACE }}
