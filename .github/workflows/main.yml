name: CI

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  release:
    types:
    - created

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
    - run: npm ci
    - name: Type-check
      run: npm run check-types
    - name: Lint
      run: npm run lint
    - name: Compile bundles
      run: npm run compile
    - name: Client unit tests
      run: npm run test:client
    - name: Parser unit tests
      run: npm run test:parser
    - name: Server handshake test
      run: npm run test:server
    - name: Output evals (grammar)
      run: npm run eval
    - name: Package smoke test
      run: npm run package
    - name: Publish to Marketplace
      if: success() && github.event_name == 'release' && matrix.os == 'ubuntu-latest'
      run: npm run deploy
      env:
        VSCE_PAT: ${{ secrets.MARKETPLACE }}

  # End-to-end acceptance tests: launch real VS Code (Electron) with the
  # extension and drive the LSP providers. Needs a display, so it runs only on
  # Linux under xvfb. Kept as its own job so the Electron download doesn't slow
  # the cross-OS unit matrix; gates push/PR as the behavioural circuit breaker.
  e2e:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
    - run: npm ci
    - name: e2e (acceptance) tests
      run: xvfb-run -a npm run test:e2e
